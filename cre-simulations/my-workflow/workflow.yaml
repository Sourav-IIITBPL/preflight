# ==========================================================================
# CRE WORKFLOW SETTINGS FILE (cre-cli v1.3+)
# ==========================================================================
# This file provides target settings required by `cre workflow ... -T <target>`.
# Use the TypeScript source entrypoint for cre-cli v1.3+.

staging-settings:
  user-workflow:
    workflow-name: "preflight-security-simulation-staging"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: ""
    secrets-path: ""

production-settings:
  user-workflow:
    workflow-name: "preflight-security-simulation-production"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: ""
    secrets-path: ""
